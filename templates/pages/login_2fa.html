{{define "login-2fa-page"}}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0b0f">
    <title>Verificação 2FA — ContaBase</title>
    
    <!-- Favicons & Manifest -->
    <link rel="shortcut icon" href="/assets/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="manifest" href="/assets/manifest.json">

    <link rel="stylesheet" href="/assets/css/style.css">
    <link rel="stylesheet" href="/assets/css/geist-sans.css">
    <link rel="stylesheet" href="/assets/css/auth-pages.css">
    <script defer src="/assets/js/login-2fa.js"></script>
</head>
<body class="min-h-screen bg-[#09090c] font-sans text-white antialiased overflow-hidden">
    <!-- Liquid blurs de fundo -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="blob absolute top-[-20%] right-[-10%] w-[55vw] h-[55vw] rounded-full bg-indigo-600/20 blur-[80px]"></div>
        <div class="blob-2 absolute bottom-[-15%] left-[-15%] w-[45vw] h-[45vw] rounded-full bg-violet-600/15 blur-[80px]"></div>
        <div class="absolute inset-0 opacity-[0.035] dot-pattern"></div>
    </div>

    <main class="relative mx-auto flex min-h-screen max-w-md items-center px-5 py-10">
        <section class="fade-up w-full rounded-3xl border border-white/[0.08] bg-white/[0.03] backdrop-blur-2xl p-7 shadow-2xl shadow-black/60">
            <!-- Ícone de Segurança -->
            <div class="mb-7 text-center">
                <div class="pulse-icon mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-gradient-to-br from-indigo-600/30 to-violet-600/30 border border-indigo-500/30">
                    <svg class="w-8 h-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
                    </svg>
                </div>
                <p class="text-[10px] font-bold uppercase tracking-wider text-indigo-300/70 mb-2">Autenticação Segura</p>
                <h1 class="text-xl font-bold text-white tracking-tight">Verificação em Duas Etapas</h1>
                <p class="mt-1.5 text-sm text-white/45">Informe o código do app autenticador ou um código de recuperação.</p>
            </div>

            {{if .Error}}
            <div class="mb-5 flex items-center gap-3 rounded-xl border border-rose-500/30 bg-rose-500/10 p-3.5">
                <svg class="w-4 h-4 text-rose-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z"/></svg>
                <p class="text-sm text-rose-200">{{.Error}}</p>
            </div>
            {{end}}

            <form method="post" action="/login/2fa" class="space-y-4">
                <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
                <label class="block space-y-2">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-white/40">Código TOTP (6 dígitos)</span>
                    <input type="text" name="code" inputmode="numeric" maxlength="6" autocomplete="one-time-code"
                        class="h-16 w-full rounded-xl border border-white/[0.08] bg-white/[0.05] px-3.5 text-center text-3xl font-mono font-black text-white tracking-[0.4em] outline-none placeholder:text-white/20 placeholder:tracking-normal focus:border-zinc-700/60 focus:ring-1 focus:ring-zinc-700/20 transition-all"
                        placeholder="○○○○○○">
                </label>

                <button type="button"
                    id="recovery-toggle"
                    class="flex items-center gap-1.5 text-xs font-medium text-indigo-300/70 transition hover:text-indigo-200">
                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 0 1 3 3m3 0a6 6 0 0 1-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 0 1 21.75 8.25Z"/></svg>
                    Usar um código de recuperação?
                </button>

                <label id="recovery-field" class="block space-y-2 hidden">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-white/40">Código de Recuperação</span>
                    <input type="text" name="backup_code" autocomplete="off" minlength="7" maxlength="8"
                        pattern="[A-Za-z0-9_-]{7,8}" autocapitalize="characters" spellcheck="false"
                        class="h-11 w-full rounded-xl border border-white/[0.08] bg-white/[0.05] px-3.5 text-sm uppercase tracking-widest text-white outline-none focus:border-zinc-700/60 focus:ring-1 focus:ring-zinc-700/20 transition-all"
                        placeholder="AB2CDE34">
                </label>

                <button type="submit"
                    class="h-12 w-full rounded-xl bg-gradient-to-r from-indigo-600 to-violet-600 text-sm font-bold text-white transition-all hover:from-indigo-500 hover:to-violet-500 active:scale-[0.98] shadow-lg shadow-indigo-500/30">
                    Validar e Entrar
                </button>
            </form>
        </section>
    </main>
</body>
</html>
{{end}}
